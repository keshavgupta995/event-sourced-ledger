<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger — Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

    <nav class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex gap-6">
        <a href="index.html" class="text-green-400 font-bold text-lg">⬡ Ledger</a>
        <a href="accounts.html" class="text-white">Accounts</a>
        <a href="transactions.html" class="text-gray-400 hover:text-white">Transactions</a>
        <a href="history.html" class="text-gray-400 hover:text-white">Audit Log</a>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-12">
        <h1 class="text-3xl font-bold text-white mb-8">Accounts</h1>

        <!-- Open Account Form -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-8">
            <h2 class="text-lg font-semibold text-white mb-4">Open New Account</h2>
            <div class="flex flex-col gap-4">
                <input id="ownerName" type="text" placeholder="Owner Name"
                       class="bg-gray-800 border border-gray-700 rounded px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-green-400" />
                <input id="initialDeposit" type="number" placeholder="Initial Deposit (₹)"
                       class="bg-gray-800 border border-gray-700 rounded px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-green-400" />
                <button onclick="openAccount()"
                        class="bg-green-500 hover:bg-green-400 text-black font-bold py-2 px-6 rounded w-fit">
                    Open Account
                </button>
                <div id="openResult" class="text-sm mt-1"></div>
            </div>
        </div>

        <!-- Accounts List -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <h2 class="text-lg font-semibold text-white mb-4">All Accounts</h2>
            <div id="accountsList" class="text-gray-400 text-sm">Loading...</div>
        </div>
    </main>

    <script>
        const API = 'http://localhost:5070';

        async function openAccount() {
            const ownerName = document.getElementById('ownerName').value.trim();
            const initialDeposit = parseFloat(document.getElementById('initialDeposit').value);
            const resultEl = document.getElementById('openResult');

            const res = await fetch(`${API}/api/accounts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ownerName, initialDeposit })
            });

            const data = await res.json();
            if (res.ok) {
                resultEl.className = 'text-green-400 text-sm mt-1';
                resultEl.textContent = `✓ Account created! ID: ${data.accountId}`;
                loadAccounts();
            } else {
                resultEl.className = 'text-red-400 text-sm mt-1';
                resultEl.textContent = `✗ ${data.error || data.errors}`;
            }
        }

        async function loadAccounts() {
            const res = await fetch(`${API}/api/accounts`);
            const accounts = await res.json();

            if (accounts.length === 0) {
                document.getElementById('accountsList').textContent = 'No accounts yet.';
                return;
            }

            const rows = accounts.map(a => `
                <div class="flex justify-between items-center py-3 border-b border-gray-800 last:border-0">
                    <div>
                        <div class="text-white font-medium">${a.ownerName}</div>
                        <div class="text-gray-500 text-xs mt-1 cursor-pointer" onclick="navigator.clipboard.writeText('${a.accountId}')" title="Click to copy">
                            ${a.accountId} 📋
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-green-400 font-bold">₹${a.balance.toLocaleString('en-IN')}</div>
                        <div class="text-gray-500 text-xs">Updated: ${new Date(a.lastUpdated).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('accountsList').innerHTML = rows;
        }

        loadAccounts();
    </script>
</body>
</html>
