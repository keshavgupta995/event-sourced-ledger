<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

    <nav class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex gap-6">
        <a href="index.html" class="text-green-400 font-bold text-lg">⬡ Ledger</a>
        <a href="accounts.html" class="text-gray-400 hover:text-white">Accounts</a>
        <a href="transactions.html" class="text-gray-400 hover:text-white">Transactions</a>
        <a href="history.html" class="text-gray-400 hover:text-white">Audit Log</a>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-16">
        <h1 class="text-4xl font-bold text-white mb-2">Event Sourced Ledger</h1>
        <p class="text-gray-400 mb-12">Double-entry bank core built with ASP.NET Core + MySQL</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <div class="text-green-400 text-2xl mb-2">⬡</div>
                <div class="text-2xl font-bold text-white" id="totalAccounts">—</div>
                <div class="text-gray-400 text-sm mt-1">Total Accounts</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <div class="text-blue-400 text-2xl mb-2">₹</div>
                <div class="text-2xl font-bold text-white" id="totalBalance">—</div>
                <div class="text-gray-400 text-sm mt-1">Total Balance</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <div class="text-purple-400 text-2xl mb-2">◎</div>
                <div class="text-2xl font-bold text-white" id="totalEvents">—</div>
                <div class="text-gray-400 text-sm mt-1">Total Events</div>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <h2 class="text-lg font-semibold text-white mb-4">All Accounts</h2>
            <div id="accountsList" class="text-gray-400 text-sm">Loading...</div>
        </div>
    </main>

    <script>
        const API = 'http://localhost:5070';

        async function loadDashboard() {
            const res = await fetch(`${API}/api/accounts`);
            const accounts = await res.json();

            document.getElementById('totalAccounts').textContent = accounts.length;

            const totalBalance = accounts.reduce((sum, a) => sum + a.balance, 0);
            document.getElementById('totalBalance').textContent = '₹' + totalBalance.toLocaleString('en-IN');

            if (accounts.length === 0) {
                document.getElementById('accountsList').textContent = 'No accounts yet. Create one in the Accounts page.';
                document.getElementById('totalEvents').textContent = '0';
                return;
            }

            // fetch event counts
            let totalEvents = 0;
            for (const acc of accounts) {
                const eRes = await fetch(`${API}/api/accounts/${acc.accountId}/history`);
                const events = await eRes.json();
                totalEvents += events.length;
            }
            document.getElementById('totalEvents').textContent = totalEvents;

            const rows = accounts.map(a => `
                <div class="flex justify-between items-center py-3 border-b border-gray-800 last:border-0">
                    <div>
                        <div class="text-white font-medium">${a.ownerName}</div>
                        <div class="text-gray-500 text-xs mt-1">${a.accountId}</div>
                    </div>
                    <div class="text-green-400 font-bold">₹${a.balance.toLocaleString('en-IN')}</div>
                </div>
            `).join('');
            document.getElementById('accountsList').innerHTML = rows;
        }

        loadDashboard();
    </script>
</body>
</html>
