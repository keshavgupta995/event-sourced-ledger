<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger — Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

    <nav class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex gap-6">
        <a href="index.html" class="text-green-400 font-bold text-lg">⬡ Ledger</a>
        <a href="accounts.html" class="text-gray-400 hover:text-white">Accounts</a>
        <a href="transactions.html" class="text-white">Transactions</a>
        <a href="history.html" class="text-gray-400 hover:text-white">Audit Log</a>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-12">
        <h1 class="text-3xl font-bold text-white mb-8">Transactions</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Deposit -->
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <h2 class="text-green-400 font-semibold mb-4">↓ Deposit</h2>
                <div class="flex flex-col gap-3">
                    <input id="depAccountId" type="text" placeholder="Account ID"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-green-400 text-sm" />
                    <input id="depAmount" type="number" placeholder="Amount (₹)"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-green-400 text-sm" />
                    <input id="depReason" type="text" placeholder="Reason"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-green-400 text-sm" />
                    <button onclick="deposit()"
                            class="bg-green-500 hover:bg-green-400 text-black font-bold py-2 rounded text-sm">
                        Deposit
                    </button>
                    <div id="depResult" class="text-xs"></div>
                </div>
            </div>

            <!-- Withdraw -->
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <h2 class="text-red-400 font-semibold mb-4">↑ Withdraw</h2>
                <div class="flex flex-col gap-3">
                    <input id="witAccountId" type="text" placeholder="Account ID"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-red-400 text-sm" />
                    <input id="witAmount" type="number" placeholder="Amount (₹)"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-red-400 text-sm" />
                    <input id="witReason" type="text" placeholder="Reason"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-red-400 text-sm" />
                    <button onclick="withdraw()"
                            class="bg-red-500 hover:bg-red-400 text-white font-bold py-2 rounded text-sm">
                        Withdraw
                    </button>
                    <div id="witResult" class="text-xs"></div>
                </div>
            </div>

            <!-- Transfer -->
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <h2 class="text-blue-400 font-semibold mb-4">⇄ Transfer</h2>
                <div class="flex flex-col gap-3">
                    <input id="trnFrom" type="text" placeholder="From Account ID"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400 text-sm" />
                    <input id="trnTo" type="text" placeholder="To Account ID"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400 text-sm" />
                    <input id="trnAmount" type="number" placeholder="Amount (₹)"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400 text-sm" />
                    <input id="trnReason" type="text" placeholder="Reason"
                           class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400 text-sm" />
                    <button onclick="transfer()"
                            class="bg-blue-500 hover:bg-blue-400 text-white font-bold py-2 rounded text-sm">
                        Transfer
                    </button>
                    <div id="trnResult" class="text-xs"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = 'http://localhost:5070';

        async function deposit() {
            const res = await fetch(`${API}/api/transactions/deposit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    accountId: document.getElementById('depAccountId').value.trim(),
                    amount: parseFloat(document.getElementById('depAmount').value),
                    reason: document.getElementById('depReason').value.trim()
                })
            });
            const data = await res.json();
            const el = document.getElementById('depResult');
            el.className = res.ok ? 'text-green-400 text-xs' : 'text-red-400 text-xs';
            el.textContent = res.ok ? `✓ New balance: ₹${data.balance.toLocaleString('en-IN')}` : `✗ ${data.error}`;
        }

        async function withdraw() {
            const res = await fetch(`${API}/api/transactions/withdraw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    accountId: document.getElementById('witAccountId').value.trim(),
                    amount: parseFloat(document.getElementById('witAmount').value),
                    reason: document.getElementById('witReason').value.trim()
                })
            });
            const data = await res.json();
            const el = document.getElementById('witResult');
            el.className = res.ok ? 'text-green-400 text-xs' : 'text-red-400 text-xs';
            el.textContent = res.ok ? `✓ New balance: ₹${data.balance.toLocaleString('en-IN')}` : `✗ ${data.error}`;
        }

        async function transfer() {
            const res = await fetch(`${API}/api/transactions/transfer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fromAccountId: document.getElementById('trnFrom').value.trim(),
                    toAccountId: document.getElementById('trnTo').value.trim(),
                    amount: parseFloat(document.getElementById('trnAmount').value),
                    reason: document.getElementById('trnReason').value.trim()
                })
            });
            const data = await res.json();
            const el = document.getElementById('trnResult');
            el.className = res.ok ? 'text-green-400 text-xs' : 'text-red-400 text-xs';
            el.textContent = res.ok ? `✓ ${data.message}` : `✗ ${data.error}`;
        }
    </script>
</body>
</html>
